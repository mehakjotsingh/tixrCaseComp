function ec(e){return e<30?'#10B981':e<60?'#F0A500':'#EF4444';}
function el(e){return e<30?'Low':e<60?'Med':'High';}
function opp(v){return Math.round(((100-v.ex)/100*45)+(v.pf/100*35)+(Math.min(v.ev/120,1)*20));}
function oc(o){return o>=75?'#10B981':o>=55?'#F0A500':'#EF4444';}

function tTab(tab){
  var m=tab==='m';
  document.getElementById('vm').style.display=m?'flex':'none';
  document.getElementById('vt').style.display=m?'none':'block';
  var bm=document.getElementById('btn-m'),bt=document.getElementById('btn-t');
  bm.style.borderBottomColor=m?'#F0A500':'transparent';bm.style.color=m?'#F0A500':'#374151';
  bt.style.borderBottomColor=m?'transparent':'#F0A500';bt.style.color=m?'#374151':'#F0A500';
  if(!m)tF();
  if(m&&TM)setTimeout(function(){TM.invalidateSize();},100);
}

function initMap(){
  TM=L.map('lmap',{zoomControl:true,attributionControl:false}).setView([20,10],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(TM);
  VD.forEach(function(v){
    var r=Math.max(6,Math.min(17,Math.sqrt(v.cap/3300)*11));
    var mk=L.circleMarker([v.la,v.lo],{radius:r,fillColor:ec(v.ex),color:'rgba(0,0,0,0.4)',weight:1.5,fillOpacity:0.82}).addTo(TM);
    mk.on('click',function(){showD(v);});
    mk.bindTooltip('<strong>'+v.n+'</strong><br>'+v.c+' · '+v.t+'<br>Cap: '+v.cap.toLocaleString()+' &nbsp;|&nbsp; Excl: '+v.ex+'&nbsp;('+el(v.ex)+')',{className:'ttip',direction:'top',offset:[0,-(r+5)]});
  });
  renderSB();
}

function renderSB(){
  var sb=document.getElementById('sb');
  var h='<div style="font-size:9px;letter-spacing:0.16em;color:#1F2937;text-transform:uppercase;margin-bottom:8px;padding-left:2px;">Target Markets</div>';
  Object.keys(MKT).forEach(function(mk){
    var m=MKT[mk];
    var vs=VD.filter(function(v){return v.mk===mk;});
    var ae=Math.round(vs.reduce(function(a,v){return a+v.ex;},0)/vs.length);
    var top=vs.slice().sort(function(a,b){return opp(b)-opp(a);})[0];
    var winnable=vs.filter(function(v){return v.ex<30;}).length;
    h+='<div onclick="flyTo(\''+mk+'\')" style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.055);border-radius:7px;padding:9px;margin-bottom:7px;cursor:pointer;" onmouseover="this.style.background=\'rgba(255,255,255,0.05)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.025)\'">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">';
    h+='<span style="font-size:12px;font-weight:600;color:#E2E8F0;">'+mk+'</span>';
    h+='<span style="font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,0.05);color:'+m.col+';">P'+m.p+'</span>';
    h+='</div>';
    h+='<div style="font-size:10px;color:#374151;margin-bottom:2px;">'+vs.length+' venues · '+m.sz+' mkt</div>';
    h+='<div style="font-size:10px;color:#374151;margin-bottom:2px;">Avg excl: <span style="color:'+ec(ae)+';">'+ae+'</span> &nbsp;·&nbsp; <span style="color:#10B981;">'+winnable+' winnable</span></div>';
    h+='<div style="font-size:9px;color:#1F2937;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Top: '+top.n+'</div>';
    h+='</div>';
  });
  sb.innerHTML=h;
}

function flyTo(mk){
  var m=MKT[mk];
  TM.flyTo(m.ctr,m.z,{duration:1.3,easeLinearity:0.5});
}

function sc(l,v){
  return '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:6px;padding:7px 9px;">' +
    '<div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#1F2937;margin-bottom:2px;">'+l+'</div>' +
    '<div style="font-size:11px;font-weight:500;color:#9CA3AF;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">'+v+'</div>' +
    '</div>';
}
function closeD(){
  document.getElementById('dp').style.width='0';
  setTimeout(function(){TM.invalidateSize();},280);
}

function tF(){
  var mk=document.getElementById('fm').value,tp=document.getElementById('ft').value,
      ex=document.getElementById('fe').value,so=document.getElementById('fs').value;
  var r=VD.filter(function(v){
    if(mk&&v.mk!==mk)return false;
    if(tp&&v.t!==tp)return false;
    if(ex==='lo'&&v.ex>=30)return false;
    if(ex==='md'&&(v.ex<30||v.ex>=60))return false;
    if(ex==='hi'&&v.ex<60)return false;
    return true;
  });
  r.sort(function(a,b){
    if(so==='opp')return opp(b)-opp(a);
    if(so==='excl')return a.ex-b.ex;
    if(so==='cap')return b.cap-a.cap;
    if(so==='ev')return b.ev-a.ev;
    if(so==='fit')return b.pf-a.pf;
    return 0;
  });
  renderTbl(r);
  document.getElementById('cnt').textContent=r.length+' / 20 venues';
}

function renderTbl(data){
  var tb=document.getElementById('tb');
  if(!data.length){
    tb.innerHTML='<tr><td colspan="10" style="text-align:center;padding:30px;color:#1F2937;font-size:12px;">No venues match selected filters</td></tr>';
    return;
  }
  tb.innerHTML=data.map(function(v,i){
    var o=opp(v),ecv=ec(v.ex),ocv=oc(o);
    return '<tr style="border-bottom:1px solid rgba(255,255,255,0.03);" onmouseover="this.style.background=\'rgba(255,255,255,0.025)\'" onmouseout="this.style.background=\'transparent\'">' +
      '<td style="padding:9px 11px;color:#1F2937;font-family:\'Courier New\',monospace;font-size:11px;">'+(i+1)+'</td>' +
      '<td style="padding:9px 11px;font-weight:500;color:#E2E8F0;max-width:135px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+v.n+'</td>' +
      '<td style="padding:9px 11px;"><span style="font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.05);color:#6B7280;white-space:nowrap;">'+v.mk+'</span></td>' +
      '<td style="padding:9px 11px;color:#374151;white-space:nowrap;font-size:11px;">'+v.t+'</td>' +
      '<td style="padding:9px 11px;text-align:right;color:#4B5563;font-family:\'Courier New\',monospace;">'+v.cap.toLocaleString()+'</td>' +
      '<td style="padding:9px 11px;text-align:right;color:#4B5563;font-family:\'Courier New\',monospace;">'+v.ev+'</td>' +
      '<td style="padding:9px 11px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:105px;font-size:11px;">'+v.vd+'</td>' +
      '<td style="padding:9px 11px;text-align:center;"><span style="font-family:\'Courier New\',monospace;font-size:12px;color:'+ecv+';">'+v.ex+'</span><span style="font-size:9px;margin-left:4px;color:'+ecv+';">'+el(v.ex)+'</span></td>' +
      '<td style="padding:9px 11px;text-align:center;"><div style="display:flex;align-items:center;gap:4px;justify-content:center;"><div style="width:34px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;"><div style="width:'+v.pf+'%;height:3px;background:#7C8EF7;border-radius:2px;"></div></div><span style="font-size:11px;color:#4B5563;">'+v.pf+'</span></div></td>' +
      '<td style="padding:9px 11px;text-align:center;"><span style="font-size:13px;font-weight:700;color:'+ocv+';font-family:\'Courier New\',monospace;">'+o+'</span></td>' +
      '</tr>';
  }).join('');
}

initMap();
tF();
</script>
